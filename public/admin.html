<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid black; padding: 8px; text-align: center; }
    button { padding: 6px 10px; margin: 2px; cursor: pointer; }
  </style>
</head>
<body>

<h2>Admin Dashboard</h2>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Survey Code</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="body"></tbody>
</table>

<script>
const body = document.getElementById('body');

async function load() {
  const res = await fetch('/admin/surveys');
  const data = await res.json();

  body.innerHTML = '';

  data.forEach(s => {
    body.innerHTML += `
      <tr>
        <td>${s.id}</td>
        <td>${s.name}</td>
        <td>${s.email}</td>
        <td>${s.surveyCode}</td>
        <td>${s.status}</td>
        <td>
          <button onclick="activate(${s.id})">Activate</button>
          <button onclick="deleteSurvey(${s.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

function activate(id) {
  fetch('/update-status', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id, status: 'active' })
  })
  .then(res => res.json())
  .then(() => {
    alert("Survey Activated & Email Sent");
    load();
  });
}

function deleteSurvey(id) {
  fetch(`/delete-survey/${id}`, { method: 'DELETE' })
    .then(res => res.json())
    .then(data => {
      alert(data.msg);
      load(); // reload table
    });
}

// Load table on open
load();
</script>

</body>
</html>
